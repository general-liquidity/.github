name: Update profile README

# Keeps the star / issue / PR badges on the org profile current. Runs daily, on
# demand, and whenever the generator or its config changes.

on:
  schedule:
    - cron: "17 6 * * *" # daily at 06:17 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/update-profile-readme.mjs"
      - ".github/workflows/update-readme.yml"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Regenerate repository tables
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/update-profile-readme.mjs
      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain profile/README.md)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add profile/README.md
            git commit -m "chore: refresh repository stats"
            git push
          else
            echo "No changes."
          fi
